<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirecting...</title>
<script>
  // Ambil path setelah domain, lalu redirect ke index dengan hash
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    '/index.html' + l.hash
  );
</script>
</head>
<body>
Redirecting to home...
</body>
</html>
